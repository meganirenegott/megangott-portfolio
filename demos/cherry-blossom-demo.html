<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Cherry Blossom Event Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ── Fake campus background ── */
    .campus-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, #2d5a27 0%, transparent 40%),
        radial-gradient(circle at 70% 60%, #3a6b34 0%, transparent 35%),
        radial-gradient(circle at 50% 80%, #2d5a27 0%, transparent 30%),
        linear-gradient(180deg, #1e4a1e 0%, #2d5a27 40%, #3a6b34 70%, #2d5a27 100%);
      image-rendering: pixelated;
    }
    .campus-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Buildings ── */
    .building {
      position: absolute;
      border-radius: 4px;
      border: 2px solid rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .building-1 { top: 15%; left: 10%; width: 120px; height: 80px; background: #4a3a6b; }
    .building-2 { top: 25%; left: 55%; width: 140px; height: 90px; background: #3a5a8b; }
    .building-3 { top: 55%; left: 25%; width: 100px; height: 70px; background: #6b4a3a; }
    .building-4 { top: 60%; left: 65%; width: 130px; height: 85px; background: #3a6b5a; }
    .building-5 { top: 10%; left: 35%; width: 90px; height: 60px; background: #5a6b3a; }

    /* ── Paths ── */
    .path { position: absolute; background: rgba(180, 160, 120, 0.25); border-radius: 2px; }
    .path-h { height: 24px; }
    .path-v { width: 24px; }
    .path-1 { top: 45%; left: 5%; width: 90%; }
    .path-2 { top: 10%; left: 45%; height: 80%; }

    /* ── Cherry blossom trees ── */
    .tree { position: absolute; width: 40px; height: 50px; }
    .tree-trunk {
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 8px; height: 20px; background: #5c3a1e; border-radius: 2px;
    }
    .tree-canopy {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 36px; height: 36px; border-radius: 50%;
      background: radial-gradient(circle, #FFB7C5 30%, #FF91A4 60%, #E8789A 100%);
      box-shadow: 0 0 12px rgba(255, 183, 197, 0.4);
    }

    /* ── Player ── */
    .player { position: absolute; top: 48%; left: 48%; width: 28px; height: 36px; z-index: 10; }
    .player-body { width: 20px; height: 20px; background: #4a90d9; border: 2px solid #2a5a9a; border-radius: 4px; margin: 0 auto; }
    .player-head { width: 16px; height: 16px; background: #f4c99a; border: 2px solid #c4956a; border-radius: 50%; margin: 0 auto 2px; }
    .player-name { text-align: center; font-size: 9px; color: #fff; background: rgba(0,0,0,0.5); padding: 1px 4px; border-radius: 3px; margin-top: 2px; white-space: nowrap; }

    /* =============================================================
       CHERRY BLOSSOM OVERLAY
       ============================================================= */
    .cherry-blossom-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 800; pointer-events: none; overflow: hidden;
      transition: opacity 0.8s ease;
    }
    .cherry-blossom-overlay.hidden { opacity: 0; }

    .cherry-blossom-overlay::before {
      content: '';
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 30% 20%, rgba(255, 183, 197, 0.08) 0%, rgba(255, 192, 203, 0.04) 40%, transparent 70%);
      pointer-events: none; z-index: -1;
    }

    .cherry-petal {
      position: absolute;
      width: var(--petal-size, 10px); height: var(--petal-size, 10px);
      opacity: 0; will-change: transform, opacity;
      animation:
        petalFall var(--fall-duration, 10s) linear var(--fall-delay, 0s) infinite,
        petalSway var(--sway-duration, 3s) ease-in-out var(--fall-delay, 0s) infinite,
        petalSpin var(--spin-duration, 4s) linear var(--fall-delay, 0s) infinite;
    }
    .cherry-petal-inner {
      width: 100%; height: 100%;
      border-radius: 50% 0 50% 0;
      background: var(--petal-color, #FFB7C5);
      box-shadow: 0 0 3px rgba(255, 183, 197, 0.3);
      transform: rotate(45deg);
    }
    .cherry-petal-inner.round { border-radius: 50%; }
    .cherry-petal-inner.pointed { border-radius: 80% 10% 80% 10%; }

    @keyframes petalFall {
      0% { transform: translate(var(--start-x, 0px), -20px); opacity: 0; }
      5% { opacity: var(--petal-opacity, 0.7); }
      90% { opacity: var(--petal-opacity, 0.7); }
      100% { transform: translate(calc(var(--start-x, 0px) + var(--drift-x, 80px)), calc(100vh + 20px)); opacity: 0; }
    }
    @keyframes petalSway {
      0%, 100% { margin-left: 0; }
      20% { margin-left: var(--sway-amount, 15px); }
      50% { margin-left: calc(var(--sway-amount, 15px) * 0.3); }
      70% { margin-left: calc(var(--sway-amount, 15px) * -0.4); }
    }
    @keyframes petalSpin {
      0% { rotate: 0deg; }
      100% { rotate: var(--spin-direction, 360deg); }
    }

    /* ── Rare sparkle petals — golden shimmer ── */
    .cherry-petal-sparkle .cherry-petal-inner {
      box-shadow:
        0 0 6px rgba(255, 215, 0, 0.6),
        0 0 12px rgba(255, 215, 0, 0.3),
        0 0 2px rgba(255, 255, 255, 0.8);
      filter: brightness(1.3) saturate(1.2);
      animation: petalSparkleShimmer 1.2s ease-in-out infinite alternate;
    }
    @keyframes petalSparkleShimmer {
      0% {
        box-shadow: 0 0 4px rgba(255, 215, 0, 0.4), 0 0 8px rgba(255, 215, 0, 0.2), 0 0 2px rgba(255, 255, 255, 0.6);
        filter: brightness(1.2) saturate(1.1);
      }
      50% {
        box-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.4), 0 0 4px rgba(255, 255, 255, 1);
        filter: brightness(1.6) saturate(1.4);
      }
      100% {
        box-shadow: 0 0 6px rgba(255, 215, 0, 0.5), 0 0 14px rgba(255, 215, 0, 0.3), 0 0 2px rgba(255, 255, 255, 0.7);
        filter: brightness(1.3) saturate(1.2);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cherry-petal { animation: none; opacity: 0; }
      .cherry-blossom-overlay::before { display: none; }
    }

    /* =============================================================
       SETTINGS BUTTON & POPOVER
       ============================================================= */
    .cherry-blossom-settings-btn {
      position: fixed; bottom: 16px; left: 16px; z-index: 850;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255, 183, 197, 0.3);
      background: rgba(20, 15, 30, 0.7);
      backdrop-filter: blur(8px);
      cursor: pointer; font-size: 18px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .cherry-blossom-settings-btn:hover {
      background: rgba(255, 183, 197, 0.15);
      border-color: rgba(255, 183, 197, 0.6);
      box-shadow: 0 2px 16px rgba(255, 183, 197, 0.2);
      transform: scale(1.1);
    }

    .cherry-blossom-settings {
      position: fixed; bottom: 60px; left: 16px; z-index: 851;
      width: 240px;
      background: rgba(15, 12, 25, 0.92);
      border: 1px solid rgba(255, 183, 197, 0.25);
      border-radius: 12px; padding: 14px 16px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 183, 197, 0.06);
      animation: settingsFadeIn 0.2s ease-out;
    }
    .cherry-blossom-settings.hidden { display: none; }

    @keyframes settingsFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .cherry-blossom-settings-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; font-size: 13px; font-weight: 600;
      color: #FFB7C5; letter-spacing: 0.3px;
    }
    .cherry-blossom-settings-close {
      background: none; border: none; color: #888;
      font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1;
      transition: color 0.15s;
    }
    .cherry-blossom-settings-close:hover { color: #FFB7C5; }

    .cherry-blossom-setting { margin-bottom: 14px; }
    .cherry-blossom-setting label {
      display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;
    }
    .cherry-blossom-setting-label {
      font-size: 11px; color: #bbb; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500;
    }
    .cherry-blossom-setting-value {
      font-size: 11px; color: #FFB7C5; font-weight: 600;
    }

    .cherry-blossom-slider {
      width: 100%; height: 4px;
      -webkit-appearance: none; appearance: none;
      border-radius: 2px; background: rgba(255, 183, 197, 0.15);
      outline: none; cursor: pointer;
    }
    .cherry-blossom-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #FFB7C5; border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer; transition: box-shadow 0.15s;
    }
    .cherry-blossom-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 8px rgba(255, 183, 197, 0.5);
    }
    .cherry-blossom-slider::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: #FFB7C5; border: 2px solid rgba(255, 255, 255, 0.3); cursor: pointer;
    }

    .cherry-blossom-setting-hints {
      display: flex; justify-content: space-between; margin-top: 3px;
      font-size: 9px; color: #666; letter-spacing: 0.3px;
    }

    .cherry-blossom-reset {
      width: 100%; padding: 6px;
      border: 1px solid rgba(255, 183, 197, 0.2);
      border-radius: 6px; background: rgba(255, 183, 197, 0.06);
      color: #999; font-size: 11px; cursor: pointer;
      transition: all 0.15s; font-family: inherit;
    }
    .cherry-blossom-reset:hover {
      background: rgba(255, 183, 197, 0.12);
      color: #FFB7C5; border-color: rgba(255, 183, 197, 0.35);
    }

    /* ── Info badge ── */
    .info-badge {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1000;
      background: rgba(10, 10, 30, 0.85);
      border: 1px solid rgba(255, 183, 197, 0.3);
      border-radius: 10px; padding: 10px 20px;
      backdrop-filter: blur(8px); text-align: center;
    }
    .info-badge h2 { font-size: 16px; color: #FFB7C5; margin-bottom: 2px; }
    .info-badge p { font-size: 11px; color: #999; }
  </style>
</head>
<body>

  <!-- Fake campus background -->
  <div class="campus-bg"></div>
  <div class="path path-h path-1"></div>
  <div class="path path-v path-2"></div>

  <!-- Buildings -->
  <div class="building building-1">Library</div>
  <div class="building building-2">Lecture Hall</div>
  <div class="building building-3">Rock Garden</div>
  <div class="building building-4">Dorm Hall</div>
  <div class="building building-5">Lab</div>

  <!-- Cherry blossom trees -->
  <div class="tree" style="top: 30%; left: 8%;"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
  <div class="tree" style="top: 12%; left: 22%;"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
  <div class="tree" style="top: 70%; left: 15%;"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
  <div class="tree" style="top: 38%; left: 78%;"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
  <div class="tree" style="top: 75%; left: 50%;"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
  <div class="tree" style="top: 18%; left: 82%;"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
  <div class="tree" style="top: 65%; left: 88%;"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>

  <!-- Player -->
  <div class="player">
    <div class="player-head"></div>
    <div class="player-body"></div>
    <div class="player-name">You</div>
  </div>

  <!-- Cherry Blossom Overlay -->
  <div class="cherry-blossom-overlay" id="blossomOverlay"></div>

  <!-- Info Badge -->
  <div class="info-badge">
    <h2>🌸 Cherry Blossom Season</h2>
    <p>Annual campus event — April 1–14</p>
  </div>

  <!-- 🌸 Settings button -->
  <button class="cherry-blossom-settings-btn" id="settingsBtn" onclick="toggleSettings()">🌸</button>

  <!-- Settings popover -->
  <div class="cherry-blossom-settings hidden" id="settingsPanel">
    <div class="cherry-blossom-settings-header">
      <span>🌸 Cherry Blossoms</span>
      <button class="cherry-blossom-settings-close" onclick="toggleSettings()">×</button>
    </div>

    <div class="cherry-blossom-setting">
      <label>
        <span class="cherry-blossom-setting-label">Density</span>
        <span class="cherry-blossom-setting-value" id="densityValue">65</span>
      </label>
      <input type="range" min="5" max="200" value="65" id="densitySlider" class="cherry-blossom-slider" oninput="updateDensity(this.value)">
      <div class="cherry-blossom-setting-hints">
        <span>Few</span>
        <span>Blizzard</span>
      </div>
    </div>

    <div class="cherry-blossom-setting">
      <label>
        <span class="cherry-blossom-setting-label">Wind Speed</span>
        <span class="cherry-blossom-setting-value" id="speedValue">Gentle</span>
      </label>
      <input type="range" min="0" max="100" value="50" id="speedSlider" class="cherry-blossom-slider" oninput="updateSpeed(this.value)">
      <div class="cherry-blossom-setting-hints">
        <span>Still</span>
        <span>Gusty</span>
      </div>
    </div>

    <button class="cherry-blossom-reset" onclick="resetDefaults()">Reset to Default</button>
  </div>

  <script>
    // ─── Configuration ───
    const PETAL_COLORS = [
      '#FFB7C5', '#FFC0CB', '#FFDDE1', '#FFE4E9', '#FFFFFF', '#F8C8DC', '#FF69B4',
    ]
    const PETAL_SHAPES = ['', 'round', 'pointed']
    const DEFAULT_DENSITY = 65
    const DEFAULT_SPEED = 50

    let currentDensity = DEFAULT_DENSITY
    let currentSpeed = DEFAULT_SPEED

    const overlay = document.getElementById('blossomOverlay')
    const settingsPanel = document.getElementById('settingsPanel')
    const densitySlider = document.getElementById('densitySlider')
    const speedSlider = document.getElementById('speedSlider')
    const densityValue = document.getElementById('densityValue')
    const speedValue = document.getElementById('speedValue')

    // Load from localStorage
    try {
      const saved = JSON.parse(localStorage.getItem('cherry-blossom-prefs') || '{}')
      if (saved.density) { currentDensity = saved.density; densitySlider.value = saved.density; }
      if (saved.speed != null) { currentSpeed = saved.speed; speedSlider.value = saved.speed; }
    } catch {}

    function speedToMultiplier(speed) {
      if (speed <= 50) return 0.2 + (speed / 50) * 0.8
      return 1.0 + ((speed - 50) / 50) * 2.0
    }

    function getSpeedLabel(speed) {
      if (speed <= 10) return 'Still'
      if (speed <= 20) return 'Very Slow'
      if (speed <= 40) return 'Slow'
      if (speed <= 60) return 'Gentle'
      if (speed <= 80) return 'Breezy'
      return 'Gusty'
    }

    function savePrefs() {
      localStorage.setItem('cherry-blossom-prefs', JSON.stringify({ density: currentDensity, speed: currentSpeed }))
    }

    const SPARKLE_COLORS = ['#FFD700', '#FFF8DC', '#E8E4D4', '#FFE4B5', '#FFFACD']

    function generatePetals(count) {
      overlay.innerHTML = ''
      const speedMult = speedToMultiplier(currentSpeed)
      for (let i = 0; i < count; i++) {
        const roll = Math.random()
        const isSparkle = roll < 0.05
        const isRare = !isSparkle && roll < 0.20
        const size = isSparkle ? (10 + Math.random() * 8) : (6 + Math.random() * 10)
        const color = isSparkle
          ? SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)]
          : isRare ? PETAL_COLORS[6] : PETAL_COLORS[Math.floor(Math.random() * 6)]
        const shape = PETAL_SHAPES[Math.floor(Math.random() * PETAL_SHAPES.length)]

        // Wind-coherent: spawn biased left, drift consistently right
        const startX = -30 + Math.random() * 100
        const driftX = 150 + Math.random() * 130
        const swayAmount = 8 + Math.random() * 12

        const fallDuration = (isSparkle ? 22 + Math.random() * 14 : 18 + Math.random() * 12) / speedMult
        const fallDelay = Math.random() * (18 / speedMult)
        const swayDuration = (4 + Math.random() * 4) / speedMult
        const spinDuration = (isSparkle ? 10 + Math.random() * 10 : 8 + Math.random() * 8) / speedMult
        const spinDir = Math.random() > 0.5 ? '360deg' : '-360deg'
        const opacity = isSparkle ? 0.8 + Math.random() * 0.2 : 0.4 + Math.random() * 0.5

        const petal = document.createElement('div')
        petal.className = `cherry-petal${isSparkle ? ' cherry-petal-sparkle' : ''}`
        petal.style.cssText = `
          --petal-size: ${size}px; --petal-color: ${color}; --petal-opacity: ${opacity};
          --start-x: ${startX}vw; --drift-x: ${driftX}px;
          --fall-duration: ${fallDuration}s; --fall-delay: ${fallDelay}s;
          --sway-duration: ${swayDuration}s; --sway-amount: ${swayAmount}px;
          --spin-duration: ${spinDuration}s; --spin-direction: ${spinDir};
        `
        const inner = document.createElement('div')
        inner.className = `cherry-petal-inner ${shape}`
        petal.appendChild(inner)
        overlay.appendChild(petal)
      }
    }

    function toggleSettings() {
      settingsPanel.classList.toggle('hidden')
    }

    function updateDensity(val) {
      currentDensity = parseInt(val)
      densityValue.textContent = val
      savePrefs()
      generatePetals(currentDensity)
    }

    function updateSpeed(val) {
      currentSpeed = parseInt(val)
      speedValue.textContent = getSpeedLabel(currentSpeed)
      savePrefs()
      generatePetals(currentDensity)
    }

    function resetDefaults() {
      currentDensity = DEFAULT_DENSITY
      currentSpeed = DEFAULT_SPEED
      densitySlider.value = DEFAULT_DENSITY
      speedSlider.value = DEFAULT_SPEED
      densityValue.textContent = DEFAULT_DENSITY
      speedValue.textContent = getSpeedLabel(DEFAULT_SPEED)
      savePrefs()
      generatePetals(currentDensity)
    }

    // ─── Player movement ───
    const player = document.querySelector('.player')
    let px = window.innerWidth * 0.48, py = window.innerHeight * 0.48
    const keys = {}
    document.addEventListener('keydown', e => { keys[e.key] = true })
    document.addEventListener('keyup', e => { keys[e.key] = false })
    function movePlayer() {
      const speed = 2
      if (keys['ArrowUp'] || keys['w']) py -= speed
      if (keys['ArrowDown'] || keys['s']) py += speed
      if (keys['ArrowLeft'] || keys['a']) px -= speed
      if (keys['ArrowRight'] || keys['d']) px += speed
      px = Math.max(0, Math.min(window.innerWidth - 28, px))
      py = Math.max(0, Math.min(window.innerHeight - 36, py))
      player.style.left = px + 'px'
      player.style.top = py + 'px'
      requestAnimationFrame(movePlayer)
    }

    // ─── Init ───
    densityValue.textContent = currentDensity
    speedValue.textContent = getSpeedLabel(currentSpeed)
    generatePetals(currentDensity)
    requestAnimationFrame(movePlayer)
  </script>
</body>
</html>
