<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 Sanctuary Pets Demo — Multiverse Campus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0f1a; color: #e0e0e0; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; height: 100vh; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #panel {
      position: fixed; top: 14px; left: 14px;
      background: rgba(10, 15, 30, 0.92);
      border: 1px solid rgba(192, 132, 252, 0.25);
      border-radius: 14px; padding: 14px 18px;
      font-size: 12px; z-index: 10; max-width: 240px;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 30px rgba(192,132,252,0.06);
    }
    #panel h3 {
      font-size: 15px; font-weight: 900; margin-bottom: 10px;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #panel p { margin: 4px 0; color: #5a6a8a; line-height: 1.5; }
    #panel .key { color: #c084fc; font-weight: 700; }
    #panel .note { color: #fbbf24; font-style: italic; margin-top: 8px; font-size: 11px; }

    #roster {
      position: fixed; top: 14px; right: 14px;
      background: rgba(10, 15, 30, 0.92);
      border: 1px solid rgba(192, 132, 252, 0.25);
      border-radius: 14px; padding: 12px 16px;
      font-size: 11px; z-index: 10; min-width: 200px;
      backdrop-filter: blur(16px);
    }
    #roster h4 { font-size: 12px; font-weight: 700; color: #c084fc; margin-bottom: 8px; }
    .pet-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; padding: 5px 8px;
      background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .pet-row .mood { font-size: 9px; color: #64748b; margin-left: auto; }

    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 15, 30, 0.92); border: 1px solid rgba(192, 132, 252, 0.35);
      border-radius: 10px; padding: 8px 20px; font-size: 13px; color: #c084fc;
      font-weight: 600; z-index: 10; transition: opacity 0.4s; opacity: 0;
      pointer-events: none; backdrop-filter: blur(10px);
    }
    #toast.show { opacity: 1; }
  
    /* Back button */
    .demo-back-btn {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      background: rgba(5, 10, 25, 0.88); border: 1px solid rgba(0, 150, 220, 0.25);
      border-radius: 10px; padding: 8px 14px; backdrop-filter: blur(12px);
      color: #48cae4; font-size: 12px; font-weight: 600; text-decoration: none;
      font-family: 'Inter', system-ui, sans-serif; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .demo-back-btn:hover { background: rgba(0, 180, 216, 0.15); border-color: rgba(0, 180, 216, 0.4); }
  </style>
</head>
<body>
  <a class="demo-back-btn" href="javascript:void(0)" onclick="history.length>1?history.back():location.href='../blog/index.html'">← Back</a>
<canvas id="c"></canvas>

<div id="panel">
  <h3>🐾 Sanctuary Pets Demo</h3>
  <p><span class="key">Click</span> Attract nearby pet</p>
  <p><span class="key">WASD</span> Move camera</p>
  <p><span class="key">F</span> Feed all pets</p>
  <p class="note">Pets roam freely — each has their own personality and wander patterns ✨</p>
</div>

<div id="roster">
  <h4>🏝️ On Campus Now</h4>
  <div id="petList"></div>
</div>

<div id="toast" id="toast"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
function resize() {
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();
const W = () => window.innerWidth, H = () => window.innerHeight;

const PETS = [
  { name: 'Mochi',    emoji: '🐱', color: '#f9a8d4', mood: 'Sleepy',    speed: 0.4, wx: 420, wy: 310, wander: 0 },
  { name: 'Bramble',  emoji: '🦊', color: '#fb923c', mood: 'Curious',   speed: 0.8, wx: 580, wy: 260, wander: 1.2 },
  { name: 'Pebble',   emoji: '🐾', color: '#86efac', mood: 'Playful',   speed: 1.2, wx: 300, wy: 400, wander: 2.1 },
  { name: 'Capybara', emoji: '🦫', color: '#d9a56e', mood: 'Relaxed',   speed: 0.3, wx: 700, wy: 350, wander: 0.5 },
  { name: 'Thistle',  emoji: '🐇', color: '#c4b5fd', mood: 'Skittish',  speed: 1.8, wx: 480, wy: 480, wander: 3.0 },
  { name: 'Ember',    emoji: '🦝', color: '#fca5a5', mood: 'Mischief',  speed: 1.0, wx: 620, wy: 430, wander: 1.8 },
];

const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'f' || e.key === 'F') feedAll();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let camX = 200, camY = 150;
let feedGlow = 0;

// Give each pet a wander target
PETS.forEach(p => {
  p.tx = p.wx; p.ty = p.wy;
  p.retargetAt = 0;
  p.happiness = 0.7 + Math.random() * 0.3;
});

function feedAll() {
  PETS.forEach(p => { p.happiness = 1.0; });
  feedGlow = 1.0;
  showToast('🍓 All pets fed! Happiness: MAX');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Click to attract pet
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) + camX;
  const my = (e.clientY - rect.top) + camY;
  let closest = null, closestD = 80;
  PETS.forEach(p => {
    const d = Math.hypot(p.wx - mx, p.wy - my);
    if (d < closestD) { closest = p; closestD = d; }
  });
  if (closest) {
    closest.tx = mx - 30; closest.ty = my - 30;
    closest.happiness = Math.min(1, closest.happiness + 0.2);
    showToast(`${closest.emoji} ${closest.name} came to you!`);
  }
});

function hash(x, y) {
  const n = x * 374761393 + y * 668265263;
  return ((n ^ (n >> 13)) * 1274126177) >>> 0;
}

// Static grass patches
const GRASS = Array.from({length: 300}, (_, i) => ({
  x: (hash(i*7, i*13) % 900) + 50,
  y: (hash(i*11, i*3) % 600) + 50,
  type: hash(i, i*5) % 4,
  size: 0.7 + (hash(i*3, i) % 10) / 14,
}));

const FLOWERS = Array.from({length: 60}, (_, i) => ({
  x: (hash(i*17, i*23) % 900) + 50,
  y: (hash(i*31, i*7) % 600) + 50,
  emoji: ['🌸','🌼','🌺','🌻','💐'][hash(i,i*3) % 5],
}));

const TREES = [
  {x: 180, y: 180}, {x: 820, y: 150}, {x: 500, y: 120},
  {x: 150, y: 500}, {x: 850, y: 480}, {x: 680, y: 560},
];

function updateRoster() {
  const list = document.getElementById('petList');
  list.innerHTML = PETS.map(p => `
    <div class="pet-row">
      <span>${p.emoji}</span>
      <span style="color:#cbd5e1;font-weight:600">${p.name}</span>
      <span class="mood">${p.mood}</span>
      <span style="font-size:10px;color:${p.happiness > 0.8 ? '#4ade80' : p.happiness > 0.5 ? '#fbbf24' : '#f87171'}">
        ${'♥'.repeat(Math.round(p.happiness * 3))}
      </span>
    </div>
  `).join('');
}

let rosterTimer = 0;

function render() {
  const t = performance.now();
  const w = W(), h = H();

  // Camera movement
  if (keys['a'] || keys['arrowleft']) camX -= 2;
  if (keys['d'] || keys['arrowright']) camX += 2;
  if (keys['w'] || keys['arrowup']) camY -= 2;
  if (keys['s'] || keys['arrowdown']) camY += 2;

  // Update pets
  PETS.forEach(p => {
    if (t > p.retargetAt) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 120;
      p.tx = Math.max(80, Math.min(920, p.wx + Math.cos(angle) * dist));
      p.ty = Math.max(80, Math.min(620, p.wy + Math.sin(angle) * dist));
      p.retargetAt = t + 2000 + Math.random() * 3000;
    }
    const dx = p.tx - p.wx, dy = p.ty - p.wy;
    const d = Math.hypot(dx, dy);
    if (d > 1) {
      p.wx += (dx / d) * p.speed;
      p.wy += (dy / d) * p.speed;
    }
    p.happiness = Math.max(0.3, p.happiness - 0.00002);
  });

  feedGlow = Math.max(0, feedGlow - 0.01);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, h);
  sky.addColorStop(0, '#0f172a');
  sky.addColorStop(1, '#1e293b');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

  // Ground
  const ground = ctx.createLinearGradient(0, h * 0.3, 0, h);
  ground.addColorStop(0, '#14532d');
  ground.addColorStop(1, '#166534');
  ctx.fillStyle = ground;
  ctx.fillRect(0, 0, w, h);

  // Feed glow overlay
  if (feedGlow > 0) {
    ctx.fillStyle = `rgba(134, 239, 172, ${feedGlow * 0.12})`;
    ctx.fillRect(0, 0, w, h);
  }

  // Grass
  for (const g of GRASS) {
    const sx = g.x - camX, sy = g.y - camY;
    if (sx < -10 || sx > w + 10 || sy < -10 || sy > h + 10) continue;
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = ['#166534','#15803d','#16a34a','#4ade80'][g.type];
    ctx.fillRect(sx, sy, 2 * g.size, 8 * g.size);
    ctx.restore();
  }

  // Flowers
  for (const f of FLOWERS) {
    const sx = f.x - camX, sy = f.y - camY;
    if (sx < -20 || sx > w + 20 || sy < -20 || sy > h + 20) continue;
    ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(f.emoji, sx, sy);
  }

  // Trees
  for (const tr of TREES) {
    const sx = tr.x - camX, sy = tr.y - camY;
    // Shadow
    ctx.save(); ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(sx + 5, sy + 55, 28, 10, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.font = '64px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('🌳', sx, sy + 40);
  }

  // Sanctuary island label
  ctx.save();
  ctx.globalAlpha = 0.5;
  const ix = 500 - camX, iy = 100 - camY;
  ctx.fillStyle = 'rgba(192,132,252,0.12)';
  ctx.beginPath(); ctx.ellipse(ix, iy + 20, 380, 60, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.6;
  ctx.font = '600 11px Inter, sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#c084fc';
  ctx.fillText('🏝️  MODEL SANCTUARY', ix, iy);
  ctx.restore();

  // Pets
  for (const p of PETS) {
    const sx = p.wx - camX, sy = p.wy - camY;
    if (sx < -60 || sx > w + 60 || sy < -60 || sy > h + 60) continue;

    // Happiness aura
    const pulse = 0.5 + 0.5 * Math.sin(t / 800);
    ctx.save();
    const aura = ctx.createRadialGradient(sx, sy, 0, sx, sy, 28);
    aura.addColorStop(0, `rgba(${hexToRgb(p.color)}, ${p.happiness * 0.4 * pulse})`);
    aura.addColorStop(1, 'transparent');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(sx, sy, 28, 0, Math.PI*2); ctx.fill();

    // Shadow
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(sx + 1, sy + 14, 10, 4, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;

    // Pet emoji
    const bob = Math.sin(t / 600 + p.wander) * 2;
    ctx.font = '26px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(p.emoji, sx, sy + bob);

    // Name tag
    ctx.font = '600 10px Inter, sans-serif';
    const nameW = ctx.measureText(p.name).width + 10;
    ctx.fillStyle = 'rgba(10,15,30,0.82)';
    ctx.beginPath();
    ctx.roundRect(sx - nameW/2, sy + 14, nameW, 16, 4);
    ctx.fill();
    ctx.fillStyle = p.color;
    ctx.fillText(p.name, sx, sy + 25);
    ctx.restore();
  }

  // Roster update
  if (t - rosterTimer > 2000) { updateRoster(); rosterTimer = t; }

  requestAnimationFrame(render);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

updateRoster();
render();
</script>
</body>
</html>
