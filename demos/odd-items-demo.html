<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎒 Odd Items Demo — Multiverse Campus</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0d1a; color: #e0e0e0; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; overflow: hidden; }
    canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }

    #app { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .inventory-window {
      background: rgba(10, 13, 26, 0.96); border: 1px solid rgba(148,163,184,0.15);
      border-radius: 20px; width: min(820px, 96vw); max-height: 92vh;
      backdrop-filter: blur(24px); box-shadow: 0 24px 80px rgba(0,0,0,0.9);
      display: flex; flex-direction: column;
    }

    .inv-header {
      padding: 18px 22px 14px; border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 12px;
    }
    .inv-title { font-size: 17px; font-weight: 900; letter-spacing: -0.3px;
      background: linear-gradient(135deg, #e2e8f0, #94a3b8);
      background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .inv-subtitle { font-size: 11px; color: #475569; margin-left: auto; }
    .inv-count { font-size: 11px; color: #64748b;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 3px 10px; }

    .inv-body { display: flex; flex: 1; min-height: 0; }

    .item-grid {
      flex: 1; padding: 16px; display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 8px; overflow-y: auto; align-content: start;
    }
    .item-grid::-webkit-scrollbar { width: 4px; }
    .item-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .item-slot {
      aspect-ratio: 1; border-radius: 12px; cursor: pointer;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: all 0.15s; position: relative; padding: 8px 4px;
      gap: 4px;
    }
    .item-slot:hover { transform: translateY(-2px); border-color: rgba(148,163,184,0.3);
      background: rgba(255,255,255,0.06); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
    .item-slot.selected { border-color: rgba(148,163,184,0.6); background: rgba(148,163,184,0.1); }
    .item-slot.rarity-uncommon { border-color: rgba(74,222,128,0.2); }
    .item-slot.rarity-uncommon:hover { border-color: rgba(74,222,128,0.5); }
    .item-slot.rarity-rare { border-color: rgba(96,165,250,0.2); }
    .item-slot.rarity-rare:hover { border-color: rgba(96,165,250,0.5); }
    .item-slot.rarity-epic { border-color: rgba(168,85,247,0.3); }
    .item-slot.rarity-epic:hover { border-color: rgba(168,85,247,0.6); }
    .item-slot.rarity-abhorrent { border-color: rgba(239,68,68,0.25); }
    .item-slot.rarity-abhorrent:hover { border-color: rgba(239,68,68,0.55); }

    .item-emoji { font-size: 28px; }
    .item-img { width: 56px; height: 56px; object-fit: contain; border-radius: 8px; image-rendering: auto; }
    .item-name { font-size: 8px; color: #64748b; text-align: center; line-height: 1.2; font-weight: 600; }

    /* Detail panel */
    .detail-panel {
      width: 260px; border-left: 1px solid rgba(255,255,255,0.06);
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .detail-empty { color: #334155; text-align: center; font-size: 12px; margin: auto; }
    .detail-header { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .detail-big-emoji { font-size: 52px; }
    .detail-big-img { width: 96px; height: 96px; object-fit: contain; border-radius: 12px; }
    .detail-name { font-size: 16px; font-weight: 900; color: #f1f5f9; text-align: center; }
    .detail-rarity {
      font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.4px;
    }
    .r-common { background: rgba(148,163,184,0.12); color: #94a3b8; border: 1px solid rgba(148,163,184,0.25); }
    .r-uncommon { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
    .r-rare { background: rgba(96,165,250,0.1); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
    .r-epic { background: rgba(168,85,247,0.12); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }
    .r-abhorrent { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
    .detail-desc { font-size: 12px; color: #64748b; line-height: 1.7; }
    .detail-mechanic {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px; padding: 10px 12px;
    }
    .mech-label { font-size: 9px; color: #475569; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
    .mech-text { font-size: 11px; color: #94a3b8; line-height: 1.5; }
    .detail-source { font-size: 10px; color: #475569; }
    .detail-source span { color: #64748b; font-weight: 600; }
    .use-btn {
      margin-top: auto; padding: 11px; border-radius: 10px; border: none;
      background: rgba(255,255,255,0.06); color: #94a3b8;
      font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;
      border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s;
    }
    .use-btn:hover { background: rgba(255,255,255,0.1); color: #cbd5e1; }
  
    /* Back button */
    .demo-back-btn {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      background: rgba(5, 10, 25, 0.88); border: 1px solid rgba(0, 150, 220, 0.25);
      border-radius: 10px; padding: 8px 14px; backdrop-filter: blur(12px);
      color: #48cae4; font-size: 12px; font-weight: 600; text-decoration: none;
      font-family: 'Inter', system-ui, sans-serif; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .demo-back-btn:hover { background: rgba(0, 180, 216, 0.15); border-color: rgba(0, 180, 216, 0.4); }
  </style>
</head>
<body>
  <a class="demo-back-btn" href="javascript:void(0)" onclick="history.length>1?history.back():location.href='../blog/index.html'">← Back</a>

    <div class="inv-body">

      <div class="detail-panel" id="detail">
        <div class="detail-empty">← Select an item<br>to view details</div>
      </div>
    </div>
  </div>
</div>

const NAME_TO_KEY = {
  'Box of Snakes': 'box-of-snakes',
  'Hot Potato': 'hot-potato',
  'Glitter Bomb': 'glitter-bomb',
  'Cursed USB Drive': 'cursed-usb',
  'Haunted Syllabus': 'haunted-syllabus',
  'Heavy Backpack': 'heavy-backpack',
  'Birthday Cake': 'birthday-cake',
  'The Consulting Duck': 'consulting-duck',
  'Fake Meeting': 'fake-meeting',
  'Unmatched Sock': 'unmatched-sock',
  'Group Chat (Muted)': 'group-chat-muted',
  'Office Pizza': 'office-pizza',
  'Vague Feedback': 'vague-feedback',
  'Roomba (Googly Eyes)': 'roomba-googly',
  'Expired Hall Pass': 'expired-hall-pass',
  'Almost Done Project™': 'almost-done-project',
  'Unsolicited Opinion': 'unsolicited-opinion',
};


const ITEMS = [
  { emoji:'🐍', name:'Box of Snakes',         rarity:'uncommon',  desc:'Something is moving inside. Shaking it seems unwise.',        mechanic:'Drop on any player. They must "open" it. Whatever that means.',  source:'Baba Yaga (15%)' },
  { emoji:'🥔', name:'Hot Potato',             rarity:'uncommon',  desc:'It is extremely hot. Why is it so hot? Just a potato.',        mechanic:'Passes to nearest player every 30 seconds. Last holder loses.',   source:'Night Owl (10%)' },
  { emoji:'✨', name:'Glitter Bomb',           rarity:'uncommon',  desc:'A harmless celebratory device. Mostly harmless.',              mechanic:'Use to coat a room in glitter. Effect: cosmetic, permanent.',       source:'Rinley (20%)' },
  { emoji:'💾', name:'Cursed USB Drive',       rarity:'abhorrent', desc:'No one knows what is on it. That is for the best.',           mechanic:'Causes random CSS to be applied to the holder\'s UI.',              source:'Baba Yaga (10%)' },
  { emoji:'📜', name:'Haunted Syllabus',        rarity:'uncommon',  desc:'Lists 47 assignments. None of them are real. Or are they?',   mechanic:'+1 to all skill checks. -1 to all sanity checks.',                source:'Prof Ada (30%)' },
  { emoji:'🎒', name:'Heavy Backpack',          rarity:'uncommon',  desc:'Contents unknown. Movement speed: -0 (it\'s a game).',        mechanic:'Grants carrying capacity. Cosmetic weight animation.',             source:'Cornelius (15%)' },
  { emoji:'🎂', name:'Birthday Cake',          rarity:'common',    desc:'Half eaten. There was no party. You are not sure whose it was.', mechanic:'Use to grant +Happy buff to nearby players.',                    source:'Rinley (25%)' },
  { emoji:'🦆', name:'The Consulting Duck',    rarity:'uncommon',  desc:'It does not quack. It asks clarifying questions.',             mechanic:'Rubber duck debugging: explains your code back to you.',           source:'Night Owl (20%)' },
  { emoji:'📅', name:'Fake Meeting',           rarity:'rare',      desc:'A calendar invite that blocks off 3 hours for no reason.',    mechanic:'Prevents other items from being used on you for 3 minutes.',       source:'Luna (15%)' },
  { emoji:'🧦', name:'Unmatched Sock',         rarity:'common',    desc:'Somehow warm. Where is the other one?',                       mechanic:'Passable. Trade for any item of equal or lesser rarity.',          source:'Byte (20%)' },
  { emoji:'💬', name:'Group Chat (Muted)',     rarity:'uncommon',  desc:'247 unread messages. It is fine. Everything is fine.',         mechanic:'Silences notification sounds in your vicinity for 5 min.',        source:'Buck (25%)' },
  { emoji:'🍕', name:'Office Pizza',           rarity:'uncommon',  desc:'Two hours old. Cold. Still kind of good?',                    mechanic:'+2 Pizza Book Club slices if you have the club membership.',       source:'No NPC source' },
  { emoji:'📋', name:'Vague Feedback',         rarity:'common',    desc:'"Interesting work." That is the entirety of the feedback.',   mechanic:'Cosmetic. Makes nearby players say "hmm" periodically.',         source:'Prof Ada (35%)' },
  { emoji:'🤖', name:'Roomba (Googly Eyes)',   rarity:'uncommon',  desc:'It has been decorated. It is doing its best.',                mechanic:'Follows you around. Bumps into things. Very determined.',         source:'Rinley (8%)' },
  { emoji:'🪪', name:'Expired Hall Pass',      rarity:'common',    desc:'It expired in 2019. Somehow no one has noticed.',             mechanic:'50% chance to skip the next mandatory event.',                     source:'Buck (20%)' },
  { emoji:'📊', name:'Almost Done Project™',   rarity:'epic',      desc:'It has been "almost done" for six weeks.',                    mechanic:'Grants the "Scope Creep" aura. Adds one task per minute.',         source:'Cornelius (20%)' },
  { emoji:'💭', name:'Unsolicited Opinion',    rarity:'abhorrent', desc:'No one asked. It will not stop.',                             mechanic:'Auto-replies to 3 chat messages with unsolicited advice.',          source:'Emma Goldman (30%)' },
];

const RARITY_CLASS = { common:'rarity-common', uncommon:'rarity-uncommon', rare:'rarity-rare', epic:'rarity-epic', abhorrent:'rarity-abhorrent' };
const RARITY_TAG   = { common:'r-common',      uncommon:'r-uncommon',      rare:'r-rare',       epic:'r-epic',      abhorrent:'r-abhorrent'      };

const grid = document.getElementById('grid');
let selectedIdx = null;

ITEMS.forEach((item, i) => {
  const slot = document.createElement('div');
  slot.className = `item-slot ${RARITY_CLASS[item.rarity]}`;
  const key = NAME_TO_KEY[item.name];
  const imgSrc = key && ITEM_IMAGES[key];
  slot.innerHTML = imgSrc
    ? `<img class="item-img" src="${imgSrc}" alt="${item.name}"><span class="item-name">${item.name}</span>`
    : `<span class="item-emoji">${item.emoji}</span><span class="item-name">${item.name}</span>`;
  slot.onclick = () => {
    document.querySelectorAll('.item-slot').forEach(s => s.classList.remove('selected'));
    slot.classList.add('selected');
    selectedIdx = i;
    showDetail(item);
  };
  grid.appendChild(slot);
});

function showDetail(item) {
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <div class="detail-header">
      ${(() => { const k = NAME_TO_KEY[item.name]; const s = k && ITEM_IMAGES[k]; return s ? '<img class="detail-big-img" src="'+s+'" alt="'+item.name+'">' : '<div class="detail-big-emoji">'+item.emoji+'</div>'; })()}
      <div class="detail-name">${item.name}</div>
      <span class="detail-rarity ${RARITY_TAG[item.rarity]}">${item.rarity.toUpperCase()}</span>
    </div>
    <div class="detail-desc">${item.desc}</div>
    <div class="detail-mechanic">
      <div class="mech-label">⚙️ MECHANIC</div>
      <div class="mech-text">${item.mechanic}</div>
    </div>
    <div class="detail-source">Drop source: <span>${item.source}</span></div>
    <button class="use-btn" onclick="alert('Item used!')">✨ Use Item</button>
  `;
}

// Canvas background
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
function resize() {
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize); resize();

const PARTICLES = Array.from({length: 30}, () => ({
  x: Math.random() * 1400, y: Math.random() * 900,
  vy: -0.15 - Math.random() * 0.2,
  emoji: ITEMS[Math.floor(Math.random() * ITEMS.length)].emoji,
  size: 10 + Math.random() * 8,
  alpha: 0.05 + Math.random() * 0.06,
}));

function render() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx.fillStyle = '#07090f'; ctx.fillRect(0, 0, w, h);
  ctx.save();
  for (const p of PARTICLES) {
    p.y += p.vy;
    if (p.y < -30) { p.y = h + 30; p.x = Math.random() * w; }
    ctx.globalAlpha = p.alpha;
    ctx.font = `${p.size}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(p.emoji, p.x, p.y);
  }
  ctx.restore();
  requestAnimationFrame(render);
}
render();
