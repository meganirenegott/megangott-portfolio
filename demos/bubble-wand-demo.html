<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🫧 Bubble Wand Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: #1a3a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Fake campus background ── */
    .campus {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1a3a1a 0%, #2a4a2a 50%, #1d3d1d 100%);
      position: relative;
    }

    /* Greenhouse building */
    .greenhouse {
      position: absolute; top: 35%; left: 8%;
      width: 100px; height: 80px;
      background: #2e7d32;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #c8e6c9; font-size: 11px; font-weight: 600;
      border: 2px solid #1b5e20;
    }

    /* Bubble wand sculpture — colorful kids toy */
    .wand-sculpture {
      position: absolute; top: 28%; left: 22%;
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s;
      filter: drop-shadow(0 2px 8px rgba(255, 200, 100, 0.3));
    }
    .wand-sculpture:hover { transform: scale(1.12) rotate(-3deg); }

    .wand-ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      margin: 0 auto;
      position: relative;
      /* Rainbow border via conic-gradient trick */
      background: conic-gradient(
        #ff4466, #ff8833, #ffdd33, #44dd66, #33bbff, #aa55ff, #ff4466
      );
      padding: 5px;
    }
    .wand-ring-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        rgba(255,255,255,0.45) 0%,
        rgba(200,220,255,0.2) 30%,
        rgba(255,180,255,0.15) 60%,
        rgba(100,200,255,0.08) 100%);
      animation: filmShimmer 3s ease-in-out infinite;
      position: relative;
    }
    /* Light reflection spot */
    .wand-ring-inner::before {
      content: '';
      position: absolute;
      top: 18%; left: 20%;
      width: 30%; height: 22%;
      border-radius: 50%;
      background: radial-gradient(ellipse,
        rgba(255,255,255,0.7), rgba(255,255,255,0.15), transparent);
      transform: rotate(-15deg);
    }
    @keyframes filmShimmer {
      0%, 100% { filter: hue-rotate(0deg) brightness(1); }
      33% { filter: hue-rotate(50deg) brightness(1.1); }
      66% { filter: hue-rotate(-40deg) brightness(1.05); }
    }

    /* Candy-striped handle */
    .wand-handle {
      width: 10px; height: 36px;
      margin: 0 auto;
      border-radius: 0 0 5px 5px;
      background: repeating-linear-gradient(
        180deg,
        #ff69b4 0px, #ff69b4 6px,
        #ffdd44 6px, #ffdd44 12px
      );
    }
    .wand-handle::after {
      content: '';
      display: block;
      width: 14px; height: 8px;
      margin: 0 auto;
      background: #ff69b4;
      border-radius: 0 0 7px 7px;
      position: relative;
      left: -2px;
    }

    /* Floating mini-bubbles */
    .mini-bubbles {
      position: absolute;
      top: -10px; left: -15px;
      width: 82px; height: 82px;
      pointer-events: none;
    }
    .mini-bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.5;
      animation: miniBubbleFloat 3s ease-in-out infinite;
    }
    .mini-bubble:nth-child(1) {
      width: 7px; height: 7px; background: #ff4466;
      top: 5px; left: 0; animation-delay: 0s;
    }
    .mini-bubble:nth-child(2) {
      width: 5px; height: 5px; background: #33bbff;
      top: -5px; right: 5px; animation-delay: 0.8s;
    }
    .mini-bubble:nth-child(3) {
      width: 6px; height: 6px; background: #44dd66;
      bottom: 25px; right: -8px; animation-delay: 1.6s;
    }
    .mini-bubble:nth-child(4) {
      width: 4px; height: 4px; background: #ffdd33;
      top: 15px; right: -5px; animation-delay: 2.2s;
    }
    @keyframes miniBubbleFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.5; }
      50% { transform: translateY(-8px) scale(1.2); opacity: 0.8; }
    }

    /* Sparkle stars */
    .sparkle {
      position: absolute;
      color: #ffee55;
      font-size: 14px;
      animation: sparkleGlow 2s ease-in-out infinite;
      pointer-events: none;
    }
    .sparkle:nth-child(1) { top: -8px; left: -12px; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: -15px; right: -5px; animation-delay: 0.7s; font-size: 10px; }
    .sparkle:nth-child(3) { top: 5px; right: -18px; animation-delay: 1.4s; font-size: 12px; }
    @keyframes sparkleGlow {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .wand-label {
      font-size: 12px; color: #ffdd88;
      margin-top: 8px;
      font-weight: 700;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    /* ── Banner ── */
    .banner {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); border-radius: 12px;
      padding: 12px 24px; text-align: center;
      border: 1px solid rgba(150,200,255,0.2);
      z-index: 100;
    }
    .banner h1 { font-size: 18px; color: #b8d4ff; font-weight: 700; }
    .banner p { font-size: 12px; color: #888; margin-top: 4px; }

    /* ── Panel ── */
    .panel-backdrop {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
    }
    .panel-backdrop.open { display: flex; }
    .panel {
      width: min(420px, 90vw); max-height: 80vh;
      background: rgba(15,12,30,0.94);
      border: 1px solid rgba(150,200,255,0.2);
      border-radius: 16px; padding: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      overflow-y: auto;
    }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .panel-title { font-size: 18px; font-weight: 700; color: #b8d4ff; }
    .panel-close {
      background: none; border: none; color: #666;
      font-size: 22px; cursor: pointer; padding: 2px 6px;
      border-radius: 4px;
    }
    .panel-close:hover { color: #b8d4ff; background: rgba(150,200,255,0.1); }
    .panel-prompt { font-size: 14px; color: #aaa; margin-bottom: 12px; line-height: 1.5; }
    .panel-textarea {
      width: 100%; min-height: 80px; resize: vertical;
      border-radius: 10px;
      border: 1px solid rgba(150,200,255,0.15);
      background: rgba(255,255,255,0.04);
      color: #e0e0e0; font-family: inherit; font-size: 14px;
      padding: 12px; outline: none;
    }
    .panel-textarea:focus {
      border-color: rgba(150,200,255,0.4);
      box-shadow: 0 0 12px rgba(150,200,255,0.08);
    }
    .panel-textarea::placeholder { color: #555; }
    .char-count { text-align: right; font-size: 11px; color: #555; margin-top: 4px; }
    .char-count.over { color: #ff6b6b; }
    .panel-submit {
      width: 100%; margin-top: 12px; padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(150,200,255,0.25);
      background: linear-gradient(135deg, rgba(100,180,255,0.15), rgba(180,100,255,0.12));
      color: #b8d4ff; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .panel-submit:hover { background: linear-gradient(135deg, rgba(100,180,255,0.25), rgba(180,100,255,0.2)); }
    .panel-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .panel-divider {
      border: none; border-top: 1px solid rgba(150,200,255,0.1);
      margin: 20px 0 16px;
    }
    .history-title { font-size: 12px; color: #777; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
    .reflection-item {
      padding: 10px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(150,200,255,0.06);
      margin-bottom: 8px;
    }
    .reflection-body { font-size: 13px; color: #ccc; line-height: 1.5; margin-bottom: 4px; }
    .reflection-date { font-size: 10px; color: #555; }

    /* ── Soap Bubble Overlay ── */
    .bubble-overlay {
      position: fixed; inset: 0;
      z-index: 800; pointer-events: none;
      overflow: hidden;
      transition: opacity 1s ease;
    }
    .bubble-overlay.hidden { opacity: 0; }

    .soap-bubble {
      position: absolute;
      left: var(--sx, 50%);
      bottom: calc(-60px - var(--sy, 0px));
      width: var(--s, 30px); height: var(--s, 30px);
      border-radius: 50%; opacity: 0;
      will-change: transform, opacity;
      animation:
        bubbleLife var(--ld, 14s) linear var(--dd, 0s) forwards,
        bubbleSway var(--sd, 4s) ease-in-out var(--dd, 0s) infinite;
    }
    .soap-bubble-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.15) 20%, transparent 50%),
        conic-gradient(from var(--ho, 0deg),
          rgba(255,100,100,0.25), rgba(255,200,100,0.25),
          rgba(100,255,100,0.25), rgba(100,200,255,0.25),
          rgba(200,100,255,0.25), rgba(255,100,200,0.25),
          rgba(255,100,100,0.25));
      border: 1.5px solid rgba(255,255,255,0.35);
      box-shadow:
        inset 0 0 calc(var(--s, 30px) * 0.2) rgba(255,255,255,0.2),
        0 0 calc(var(--s, 30px) * 0.15) rgba(200,220,255,0.15);
      animation: bubbleShimmer var(--shd, 4s) ease-in-out infinite;
    }
    .soap-bubble-inner::before {
      content: '';
      position: absolute; top: 18%; left: 22%;
      width: 25%; height: 20%; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
      transform: rotate(-20deg);
    }

    /* Full lifecycle: grow → drift lazily → pop
       --dx, --dy: random drift direction per bubble */
    @keyframes bubbleLife {
      0% {
        transform: translate(0, 0) scale(0.1);
        opacity: 0;
      }
      5% {
        transform: translate(0, -15px) scale(0.5);
        opacity: var(--bo, 0.7);
      }
      12% {
        transform: translate(
          calc(var(--dx, 50px) * 0.08),
          calc(var(--dy, -200px) * 0.08)
        ) scale(0.9);
        opacity: var(--bo, 0.7);
      }
      18% {
        transform: translate(
          calc(var(--dx, 50px) * 0.15),
          calc(var(--dy, -200px) * 0.15)
        ) scale(1);
        opacity: var(--bo, 0.7);
      }
      80% {
        transform: translate(
          calc(var(--dx, 50px) * 0.8),
          calc(var(--dy, -200px) * 0.8)
        ) scale(1);
        opacity: var(--bo, 0.7);
      }
      92% {
        transform: translate(
          calc(var(--dx, 50px) * 0.92),
          calc(var(--dy, -200px) * 0.92)
        ) scale(1.15);
        opacity: var(--bo, 0.7);
      }
      96% {
        transform: translate(
          calc(var(--dx, 50px) * 0.96),
          calc(var(--dy, -200px) * 0.96)
        ) scale(1.35);
        opacity: 0.3;
      }
      100% {
        transform: translate(var(--dx, 50px), var(--dy, -200px)) scale(0);
        opacity: 0;
      }
    }
    /* Asymmetric sway: bigger swing rightward (wind direction) */
    @keyframes bubbleSway {
      0%, 100% { margin-left: 0; }
      25% { margin-left: var(--sa, 15px); }
      50% { margin-left: calc(var(--sa, 15px) * 0.3); }
      75% { margin-left: calc(var(--sa, 15px) * -0.35); }
    }
    @keyframes bubbleWobble {
      0%, 100% { transform: scale(1); }
      30% { transform: scale(1.04, 0.97); }
      70% { transform: scale(0.97, 1.03); }
    }
    @keyframes bubbleShimmer {
      0% { filter: hue-rotate(0deg) brightness(1); }
      33% { filter: hue-rotate(60deg) brightness(1.1); }
      66% { filter: hue-rotate(120deg) brightness(1); }
      100% { filter: hue-rotate(0deg) brightness(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .soap-bubble { animation: none; opacity: 0; }
    }
  
    /* Back button */
    .demo-back-btn {
      position: fixed; top: 12px; right: 12px; z-index: 9999;
      background: rgba(5, 10, 25, 0.88); border: 1px solid rgba(0, 150, 220, 0.25);
      border-radius: 10px; padding: 8px 14px; backdrop-filter: blur(12px);
      color: #48cae4; font-size: 12px; font-weight: 600; text-decoration: none;
      font-family: 'Inter', system-ui, sans-serif; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .demo-back-btn:hover { background: rgba(0, 180, 216, 0.15); border-color: rgba(0, 180, 216, 0.4); }
  </style>
</head>
<body>
  <a class="demo-back-btn" href="javascript:void(0)" onclick="history.length>1?history.back():location.href='../blog/index.html'">← Back</a>
  <div class="campus">
    <div class="greenhouse">🌿 Greenhouse</div>

    <div class="wand-sculpture" id="wand" onclick="openPanel()">
      <div class="sparkle">✦</div>
      <div class="sparkle">✦</div>
      <div class="sparkle">✦</div>
      <div class="mini-bubbles">
        <div class="mini-bubble"></div>
        <div class="mini-bubble"></div>
        <div class="mini-bubble"></div>
        <div class="mini-bubble"></div>
      </div>
      <div class="wand-ring"><div class="wand-ring-inner"></div></div>
      <div class="wand-handle"></div>
      <div class="wand-label">🫧 Bubble Wand</div>
    </div>
  </div>

  <div class="banner">
    <h1>🫧 Bubble Wand Sculpture Demo</h1>
    <p>Click the sculpture to submit a learning reflection</p>
  </div>

  <!-- Panel -->
  <div class="panel-backdrop" id="backdrop" onclick="closePanel()">
    <div class="panel" onclick="event.stopPropagation()">
      <div class="panel-header">
        <span class="panel-title">🫧 Bubble Wand</span>
        <button class="panel-close" onclick="closePanel()">×</button>
      </div>
      <p class="panel-prompt">What did you learn today? Share a quick reflection and watch the bubbles fly!</p>
      <textarea class="panel-textarea" id="reflection" placeholder="Today I learned..." maxlength="550" oninput="updateCount()"></textarea>
      <div class="char-count" id="charCount">0/500</div>
      <button class="panel-submit" id="submitBtn" onclick="submitReflection()" disabled>Blow Bubbles! 🫧</button>
      <hr class="panel-divider">
      <div class="history-title" id="historyTitle">Your Learning Journal (0)</div>
      <div id="history"></div>
    </div>
  </div>

  <!-- Bubble overlay -->
  <div class="bubble-overlay hidden" id="bubbleOverlay"></div>

  <script>
    const reflections = []

    function openPanel() {
      document.getElementById('backdrop').classList.add('open')
      document.getElementById('reflection').focus()
    }

    function closePanel() {
      document.getElementById('backdrop').classList.remove('open')
    }

    function updateCount() {
      const ta = document.getElementById('reflection')
      const count = document.getElementById('charCount')
      const btn = document.getElementById('submitBtn')
      const len = ta.value.length
      count.textContent = `${len}/500`
      count.className = len > 500 ? 'char-count over' : 'char-count'
      btn.disabled = !ta.value.trim() || len > 500
    }

    function submitReflection() {
      const ta = document.getElementById('reflection')
      const body = ta.value.trim()
      if (!body) return

      reflections.unshift({ body, date: new Date() })
      ta.value = ''
      updateCount()
      closePanel()
      renderHistory()
      blowBubbles()
    }

    function renderHistory() {
      const container = document.getElementById('history')
      document.getElementById('historyTitle').textContent = `Your Learning Journal (${reflections.length})`
      container.innerHTML = reflections.map(r => `
        <div class="reflection-item">
          <div class="reflection-body">${r.body}</div>
          <div class="reflection-date">${r.date.toLocaleDateString('en-US', {
            weekday: 'short', month: 'short', day: 'numeric',
            hour: 'numeric', minute: '2-digit'
          })}</div>
        </div>
      `).join('')
    }

    let spawnInterval = null

    function blowBubbles() {
      const overlay = document.getElementById('bubbleOverlay')
      overlay.innerHTML = ''
      overlay.classList.remove('hidden')

      // Stop any existing spawner
      if (spawnInterval) clearInterval(spawnInterval)

      // Get the wand ring position as the bubble origin
      const wand = document.getElementById('wand')
      const ring = wand.querySelector('.wand-ring')
      const rect = ring.getBoundingClientRect()
      const originX = rect.left + rect.width / 2
      const originY = rect.top + rect.height / 2

      // Initial burst of bubbles with staggered delays
      for (let i = 0; i < 12; i++) {
        spawnBubble(overlay, i * 0.3, originX, originY)
      }

      // Continuously spawn new bubbles every 800ms
      spawnInterval = setInterval(() => {
        // Recalculate in case of scroll/resize
        const r = ring.getBoundingClientRect()
        spawnBubble(overlay, 0, r.left + r.width / 2, r.top + r.height / 2)
        // Clean up old finished bubbles (keep DOM light)
        while (overlay.children.length > 60) {
          overlay.removeChild(overlay.firstChild)
        }
      }, 800)

      // Auto-dismiss after 3 minutes
      setTimeout(() => {
        if (spawnInterval) clearInterval(spawnInterval)
        spawnInterval = null
        overlay.classList.add('hidden')
        setTimeout(() => { overlay.innerHTML = '' }, 1000)
      }, 3 * 60 * 1000)
    }

    function spawnBubble(overlay, delay, originX, originY) {
      const size = 20 + Math.random() * 40
      // Spawn near the wand ring with small random offset (±30px)
      const spawnX = originX + (Math.random() - 0.5) * 60

      // Random drift direction (full 360°) with gentle upward bias
      const angle = Math.random() * Math.PI * 2 // full circle
      const distance = 400 + Math.random() * 500 // how far to travel
      let dx = Math.cos(angle) * distance
      let dy = Math.sin(angle) * distance
      // Bias upward: subtract extra from Y so bubbles tend to rise
      dy -= 200 + Math.random() * 250

      // Slower floating: 18-35 seconds
      const lifeDuration = 18 + Math.random() * 17
      const swayDur = 4 + Math.random() * 4
      // Gentle sway
      const swayAmt = 20 + Math.random() * 40
      const swaySign = Math.random() > 0.5 ? 1 : -1
      const shimmerDur = 3 + Math.random() * 4
      const hueOff = Math.random() * 360
      const opacity = 0.55 + Math.random() * 0.3

      const bubble = document.createElement('div')
      bubble.className = 'soap-bubble'
      bubble.style.cssText = `
        --s:${size}px; --bo:${opacity};
        --sx:${spawnX}px; --sy:0px;
        --dx:${dx}px; --dy:${dy}px;
        --ld:${lifeDuration}s; --dd:${delay}s;
        --sd:${swayDur}s; --sa:${swayAmt * swaySign}px;
        --shd:${shimmerDur}s;
        --ho:${hueOff}deg;
        bottom: ${window.innerHeight - originY}px;
      `
      bubble.innerHTML = '<div class="soap-bubble-inner"></div>'
      overlay.appendChild(bubble)
    }
  </script>
</body>
</html>
