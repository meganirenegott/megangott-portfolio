  <!-- ======================== PARTICLES ======================== -->
  <canvas id="particles" aria-hidden="true"></canvas>

  <script src="../script.js"></script>
  <script>
    // Lightweight markdown-to-HTML renderer (no dependencies)
    function renderMarkdown(md) {
      let html = md;

      // Code blocks (``` fenced)
      html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
        const escaped = code
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        return `<pre><code class="language-${lang || 'text'}">${escaped.trim()}</code></pre>`;
      });

      // Images ![alt](src)
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, src) => {
        return `<figure class="post-figure"><img src="${src}" alt="${alt}" loading="lazy"><figcaption>${alt}</figcaption></figure>`;
      });

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Headers
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');

      // Bold + italic
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Ordered lists
      html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');

      // Unordered lists
      html = html.replace(/^- \*\*(.+?)\*\*(.*)$/gm, '<li><strong>$1</strong>$2</li>');
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');

      // Wrap consecutive <li> in <ul> or <ol>
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, (match) => {
        return '<ul>' + match + '</ul>';
      });

      // Paragraphs — split by double newline, wrap non-block content
      const blocks = html.split(/\n\n+/);
      html = blocks.map(block => {
        const trimmed = block.trim();
        if (!trimmed) return '';
        if (/^<(?:h[1-6]|pre|ul|ol|li|blockquote|div|figure)/.test(trimmed)) return trimmed;
        return `<p>${trimmed}</p>`;
      }).join('\n');

      // Clean up stray single newlines inside paragraphs
      html = html.replace(/<p>([\s\S]*?)<\/p>/g, (_, content) => {
        return '<p>' + content.replace(/\n/g, ' ') + '</p>';
      });

      return html;
    }

    // Load and render the post
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      if (!slug) {
        document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
        return;
      }

      try {
        // Load metadata
        const indexRes = await fetch('posts/index.json');
        const indexData = await indexRes.json();
        const post = indexData.posts.find(p => p.slug === slug);

        if (!post) {
          document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
          return;
        }

        // Set page title
        document.title = `${post.title} — Megan Gott`;

        // Render header
        const dateStr = new Date(post.date + 'T00:00:00').toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric'
        });
        document.getElementById('post-meta').innerHTML = `
          <time datetime="${post.date}">${dateStr}</time>
          <span class="post-read-time">${post.readTime} read</span>
          <span class="post-project">Project: ${post.project}</span>
        `;
        document.getElementById('post-title').textContent = post.title;
        document.getElementById('post-subtitle').textContent = post.subtitle;
        document.getElementById('post-tags').innerHTML = post.tags
          .map(t => `<span class="blog-tag">${t}</span>`).join('');

        // Load markdown content
        const mdRes = await fetch(`posts/${slug}.md`);
        const mdText = await mdRes.text();

        // Render
        document.getElementById('post-content').innerHTML = renderMarkdown(mdText);

        // If the post has a demo, add an interactive embed section
        if (post.demo) {
          const demoSection = document.createElement('div');
          demoSection.className = 'post-demo-embed';
          demoSection.innerHTML = `
            <h2>Try it yourself</h2>
            <p class="post-demo-description">Click the bubble wand sculpture to write a reflection and watch the bubbles fly.</p>
            <div class="post-demo-frame-wrapper">
              <iframe src="${post.demo}" class="post-demo-frame" title="Interactive Demo" allow="fullscreen"></iframe>
            </div>
          `;
          document.querySelector('.post-content').appendChild(demoSection);
        }
      } catch (e) {
        console.error('Failed to load post:', e);
        document.getElementById('post-content').innerHTML = '<p>Failed to load post.</p>';
      }
    })();
  </script>
</body>
</html>
